name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-and-test:
    name: clippy + test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install shadowsocks-rust (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          VER="v1.21.2"
          curl -fsSL "https://github.com/shadowsocks/shadowsocks-rust/releases/download/${VER}/shadowsocks-${VER}.x86_64-unknown-linux-gnu.tar.xz" \
            | tar -xJ
          sudo mv ssserver sslocal /usr/local/bin/
          ssserver --version
          sslocal --version
      - name: Install shadowsocks-rust (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install shadowsocks-rust
          ssserver --version
          sslocal --version
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --lib --tests
